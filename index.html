<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>birth 班表整理工具</title>
  <meta name="description" content="上傳 PDF 或 Excel 班表，自動整理每日人力、員工班次與通知文案。">
  <link rel="icon" href="data:,">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/scheduler.css">
</head>
<body>
  <main class="shell">
    <header class="site-header">
      <div class="brand">
        <p class="eyebrow">birth roster</p>
        <h1>班表查詢</h1>
      </div>
      <button class="header-admin" id="openAdminPanel" type="button" aria-haspopup="dialog">
        <span class="header-admin-icon" aria-hidden="true">⚙</span>
        <span>主管</span>
      </button>
    </header>
    <p class="status-banner" id="statusLine">正在讀取最新班表...</p>

    <section class="toolbar" aria-label="班表篩選">
      <label>
        月份
        <select id="monthFilter"></select>
      </label>
      <label>
        員工
        <select id="employeeFilter"></select>
      </label>
      <label>
        顯示
        <select id="viewFilter">
          <option value="all">全部</option>
          <option value="work">只看上班</option>
          <option value="off">只看休假</option>
        </select>
      </label>
      <button id="exportCsv" class="ghost-action" type="button" disabled>匯出 CSV</button>
    </section>

    <section class="employee-strip" id="employeeChips" aria-label="員工快速切換"></section>

    <section class="metrics-grid" aria-label="班表摘要">
      <article class="metric">
        <span>上班班次</span>
        <strong id="metricShifts">0</strong>
      </article>
      <article class="metric">
        <span>員工人數</span>
        <strong id="metricEmployees">0</strong>
      </article>
      <article class="metric">
        <span>總工時</span>
        <strong id="metricHours">0</strong>
      </article>
      <article class="metric">
        <span>需留意日期</span>
        <strong id="metricNotes">0</strong>
      </article>
    </section>

    <section class="personal-focus" aria-label="個人班表">
      <div class="personal-summary">
        <p class="eyebrow">personal roster</p>
        <h2 id="personalName">選擇員工</h2>
        <p id="personalRole">上傳班表後點選姓名，就能看個人班表。</p>
        <div class="personal-kpis">
          <span><strong id="personalWorkCount">0</strong> 班</span>
          <span><strong id="personalHours">0</strong> 小時</span>
          <span><strong id="personalOffCount">0</strong> 天休假</span>
        </div>
        <div class="next-shift" id="personalNext">尚無班表資料</div>
      </div>
      <div class="personal-list" id="personalShiftList"></div>
    </section>

    <section class="workspace">
      <aside class="side-pane">
        <div class="pane-head">
          <h2>員工通知</h2>
          <button id="copyMessage" class="small-action" type="button" disabled>複製</button>
        </div>
        <select id="messageEmployee"></select>
        <textarea id="messageText" rows="12" readonly placeholder="上傳班表後，選擇員工即可產生通知文案。"></textarea>
        <div class="staff-bars" id="staffBars"></div>
      </aside>

      <section class="main-pane">
        <div class="pane-head">
          <h2 id="calendarTitle">月曆視覺化</h2>
          <span id="parseMeta">等待檔案</span>
        </div>
        <div class="calendar-grid" id="calendarGrid"></div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>日期</th>
                <th>員工</th>
                <th>班次</th>
                <th>工時</th>
                <th>備註</th>
              </tr>
            </thead>
            <tbody id="shiftTable"></tbody>
          </table>
        </div>
      </section>
    </section>
  </main>

  <dialog id="adminPanel" class="admin-dialog" aria-label="主管模式">
    <div class="admin-dialog-card">
      <header class="admin-dialog-head">
        <div>
          <p class="eyebrow">supervisor</p>
          <h2>主管模式</h2>
        </div>
        <button type="button" class="day-detail-close" id="adminPanelClose" aria-label="關閉">×</button>
      </header>
      <p class="admin-dialog-lede">登入後上傳 Excel 或 PDF，系統會解析後發布給所有員工。</p>
      <label class="admin-login">
        主管密碼
        <input id="adminPassword" type="password" autocomplete="current-password" placeholder="輸入密碼以解鎖上傳">
      </label>
      <input id="fileInput" type="file" accept=".xlsx,.xls,.csv,.pdf,application/pdf,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet,application/vnd.ms-excel" hidden>
      <div class="admin-actions">
        <button class="ghost-action" id="adminLogin" type="button">登入</button>
        <button class="primary-action" id="pickFile" type="button" disabled>選擇班表檔案</button>
        <button class="ghost-action" id="publishRoster" type="button" disabled>發布給員工</button>
      </div>
      <div class="admin-dropzone" id="dropZone">
        <span class="admin-dropzone-title">拖曳檔案到這裡</span>
        <span id="fileHint">登入後可拖曳 PDF / Excel，解析確認後再發布。</span>
      </div>
      <div class="status-line" id="adminStatus">尚未登入主管模式</div>
    </div>
  </dialog>

  <dialog id="dayDetail" class="day-detail" aria-label="當日班表詳情">
    <div class="day-detail-card">
      <header class="day-detail-head">
        <div>
          <h2 class="day-detail-title" id="dayDetailTitle">日期</h2>
          <p class="day-detail-weekday" id="dayDetailWeekday"></p>
        </div>
        <button type="button" class="day-detail-close" id="dayDetailClose" aria-label="關閉">×</button>
      </header>
      <div id="dayDetailNote"></div>
      <section class="day-detail-section" id="dayDetailWorkSection">
        <h3>上班</h3>
        <ul class="day-detail-list" id="dayDetailWorkList"></ul>
      </section>
      <section class="day-detail-section" id="dayDetailOffSection">
        <h3>休假</h3>
        <ul class="day-detail-list" id="dayDetailOffList"></ul>
      </section>
    </div>
  </dialog>

  <template id="emptyState">
    <div class="empty-state">
      <strong>先上傳一份班表</strong>
      <p>建議使用目前店內的月班表 Excel；PDF 若是從試算表匯出，也會盡量依文字位置解析。</p>
    </div>
  </template>

  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="assets/scheduler.js"></script>
</body>
</html>
